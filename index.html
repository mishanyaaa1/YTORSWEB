    <!-- Enhanced loading optimization -->
    <script>
      // Enhanced font and resource loading detection
      (function() {
        const root = document.getElementById('root');
        const loader = document.getElementById('initial-loader');
        let fontsLoaded = false;
        let imagesLoaded = false;
        
        // Show content when everything is ready
        function showContent() {
          if (fontsLoaded && imagesLoaded) {
            root.classList.remove('font-loading');
            root.classList.add('font-loaded');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => {
                loader.style.display = 'none';
              }, 300);
            }
          }
        }
        
        // Check if Russo One font is loaded
        function checkFont() {
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
              fontsLoaded = true;
              showContent();
            });
          } else {
            // Fallback
            setTimeout(() => {
              fontsLoaded = true;
              showContent();
            }, 1000);
          }
        }
        
        // Check if critical images are loaded
        function checkImages() {
          const logoImages = [
            '/src/img/лого вектор 2-min.webp',
            '/src/img/лого вектор 2-min.png'
          ];
          
          let loadedCount = 0;
          const totalImages = logoImages.length;
          
          logoImages.forEach(src => {
            const img = new Image();
            img.onload = img.onerror = () => {
              loadedCount++;
              if (loadedCount >= totalImages) {
                imagesLoaded = true;
                showContent();
              }
            };
            img.src = src;
          });
          
          // Fallback for images
          setTimeout(() => {
            imagesLoaded = true;
            showContent();
          }, 1500);
        }
        
        // Start checks when DOM is ready
        function startChecks() {
          checkFont();
          checkImages();
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startChecks);
        } else {
          startChecks();
        }
        
        // Ultimate fallback - show content after maximum wait time
        setTimeout(() => {
          fontsLoaded = true;
          imagesLoaded = true;
          showContent();
        }, 3000);
      })();
    </script>
