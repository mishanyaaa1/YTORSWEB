services:
  - type: web
    name: ytorsweb-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin31827
      - key: DATABASE_URL
        fromDatabase:
          name: ytorsweb-db
          property: connectionString

databases:
  - name: ytorsweb-db
    databaseName: ytorsweb
    user: ytorsweb_user
